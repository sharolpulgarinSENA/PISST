services:
  - type: web
    name: pisst-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: GEMINI_API_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: cron
    name: pisst-verificar-vencidas
    env: python
    region: oregon
    plan: free
    branch: main
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python -c "
      import os, requests;
      requests.post(
        os.getenv('BACKEND_URL') + '/auditorias/verificar-vencidas',
        headers={'x-admin-key': os.getenv('ADMIN_SECRET_KEY')}
      )
      "
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
